name: Release

# Changesets-driven release. On push to main:
#   - if there are pending changesets → opens/updates a "Version Packages" PR
#     (bumps version, writes CHANGELOG.md)
#   - when that PR is merged (no changesets left) → publishes to npm via OIDC
#     trusted publishing (no NPM_TOKEN, automatic provenance) and creates the
#     matching GitHub Release.
#
# Filename stays publish.yml so the npm trusted-publisher binding still matches.
# Requires: Settings → Actions → General → "Allow GitHub Actions to create and
# approve pull requests".
on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # version PR + GitHub releases
      pull-requests: write # open the Version Packages PR
      id-token: write # OIDC trusted publishing + provenance
    steps:
      # persist-credentials needed: changesets/action pushes the version branch.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # zizmor: ignore[artipacked] v4.3.1
      # actions/setup-node v4.4.0 — no dependency cache configured in this job
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # zizmor: ignore[cache-poisoning]
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Trusted publishing requires npm >= 11.5.1 (newer than Node 22 bundles).
      - run: npm install -g npm@latest
      - uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0 # v1.9.0
        with:
          version: npm run changeset:version
          publish: npm run changeset:publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
